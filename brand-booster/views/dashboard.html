<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Brand Booster AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: white; }
    .sidebar { background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.08); }
    .nav-item { transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(102,126,234,0.15); color: #818cf8; }
    .nav-item.active { border-right: 3px solid #667eea; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; }
    .card:hover { background: rgba(255,255,255,0.07); border-color: rgba(102,126,234,0.3); transform: translateY(-2px); }
    .stat-card { background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.1)); border: 1px solid rgba(102,126,234,0.25); }
    .tool-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
    .topbar { background: rgba(10,10,15,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .mobile-menu-open { transform: translateX(0) !important; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-64 flex-col fixed lg:relative h-full z-30 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex">
    <div class="p-6 border-b border-white/8">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl tool-icon flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-white text-sm">Brand Booster</p>
          <p class="text-gray-500 text-xs">AI Agent</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <a href="#dashboard" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="#ai-tools" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
        AI Tools
      </a>
      <a href="#analytics" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Analytics
      </a>
      <a href="#settings" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </a>
    </nav>

    <div class="p-4 border-t border-white/8">
      <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-500 hover:text-red-400 text-sm font-medium w-full transition-colors hover:bg-red-400/10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Bar -->
    <header class="topbar px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h1 class="text-lg font-semibold text-white">Dashboard</h1>
          <p class="text-gray-500 text-xs" id="welcomeMsg">Welcome back!</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="hidden md:flex items-center gap-2 bg-white/5 rounded-xl px-3 py-2 border border-white/10">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" placeholder="Search tools..." class="bg-transparent text-sm text-white placeholder-gray-500 w-40 outline-none">
        </div>
        <div class="w-9 h-9 rounded-xl avatar flex items-center justify-center cursor-pointer" id="userAvatar">
          <span class="text-white font-semibold text-sm" id="avatarInitial">U</span>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-6">

      <!-- Stats Row -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="stat-card rounded-2xl p-5">
          <div class="flex items-center justify-between mb-3">
            <p class="text-gray-400 text-sm">Tools Used</p>
            <div class="w-9 h-9 rounded-xl bg-indigo-500/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
              </svg>
            </div>
          </div>
          <p class="text-3xl font-bold text-white" id="statTools">--</p>
          <p class="text-gray-500 text-xs mt-1">Total sessions</p>
        </div>
        <div class="stat-card rounded-2xl p-5">
          <div class="flex items-center justify-between mb-3">
            <p class="text-gray-400 text-sm">AI Credits Used</p>
            <div class="w-9 h-9 rounded-xl bg-purple-500/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
          </div>
          <p class="text-3xl font-bold text-white" id="statTokens">--</p>
          <p class="text-gray-500 text-xs mt-1">Tokens consumed</p>
        </div>
        <div class="stat-card rounded-2xl p-5">
          <div class="flex items-center justify-between mb-3">
            <p class="text-gray-400 text-sm">Active Plan</p>
            <div class="w-9 h-9 rounded-xl bg-green-500/20 flex items-center justify-center">
              <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </div>
          <p class="text-3xl font-bold text-white">Pro</p>
          <p class="text-gray-500 text-xs mt-1">All tools unlocked</p>
        </div>
      </div>

      <!-- AI Tools Grid -->
      <div class="mb-8">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-semibold text-white">AI Tools</h2>
          <span class="text-gray-500 text-sm" id="toolCount">Loading...</span>
        </div>
        <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Skeleton loaders -->
          <div class="card rounded-2xl p-5 skeleton h-32"></div>
          <div class="card rounded-2xl p-5 skeleton h-32"></div>
          <div class="card rounded-2xl p-5 skeleton h-32"></div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div>
        <h2 class="text-lg font-semibold text-white mb-5">Recent Activity</h2>
        <div class="card rounded-2xl overflow-hidden">
          <div id="activityList" class="divide-y divide-white/5">
            <div class="p-4 skeleton h-14"></div>
            <div class="p-4 skeleton h-14"></div>
            <div class="p-4 skeleton h-14"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Mobile Overlay -->
  <div id="overlay" class="fixed inset-0 bg-black/60 z-20 lg:hidden hidden" onclick="toggleSidebar()"></div>

  <script>
    const toolIcons = {
      chat: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>',
      edit: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>',
      analytics: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>',
      share: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>',
      search: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>',
      mail: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>',
    };

    const categoryColors = {
      Communication: 'bg-blue-500/20 text-blue-400',
      Content: 'bg-purple-500/20 text-purple-400',
      Analytics: 'bg-indigo-500/20 text-indigo-400',
      Social: 'bg-pink-500/20 text-pink-400',
      Marketing: 'bg-orange-500/20 text-orange-400',
    };

    async function init() {
      try {
        const [meRes, statsRes, toolsRes] = await Promise.all([
          fetch('/api/auth/me'),
          fetch('/api/dashboard/stats'),
          fetch('/api/dashboard/tools'),
        ]);
        const { user } = await meRes.json();
        const stats = await statsRes.json();
        const { tools } = await toolsRes.json();

        document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;
        document.getElementById('avatarInitial').textContent = user.name[0].toUpperCase();

        document.getElementById('statTools').textContent = stats.toolsUsed;
        document.getElementById('statTokens').textContent = stats.tokensUsed.toLocaleString();

        renderTools(tools);
        renderActivity(stats.recentActivity);
      } catch {
        window.location.href = '/login';
      }
    }

    function renderTools(tools) {
      const grid = document.getElementById('toolsGrid');
      document.getElementById('toolCount').textContent = `${tools.length} tools available`;
      grid.innerHTML = tools.map(tool => `
        <div class="card rounded-2xl p-5 cursor-pointer" onclick="useTool('${tool.id}', '${tool.name}')">
          <div class="flex items-start gap-4">
            <div class="w-10 h-10 rounded-xl tool-icon flex items-center justify-center shrink-0">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                ${toolIcons[tool.icon] || toolIcons.chat}
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="text-white font-medium text-sm">${tool.name}</h3>
              <p class="text-gray-500 text-xs mt-1 leading-relaxed">${tool.description}</p>
              <span class="inline-block mt-2 text-xs px-2 py-0.5 rounded-lg ${categoryColors[tool.category] || 'bg-gray-500/20 text-gray-400'}">
                ${tool.category}
              </span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderActivity(activity) {
      const list = document.getElementById('activityList');
      if (!activity?.length) {
        list.innerHTML = '<div class="p-6 text-center text-gray-500 text-sm">No recent activity</div>';
        return;
      }
      list.innerHTML = activity.map(a => `
        <div class="flex items-center gap-4 p-4">
          <div class="w-2 h-2 rounded-full bg-indigo-400 shrink-0"></div>
          <div class="flex-1">
            <p class="text-white text-sm">${a.action.replace(/_/g, ' ')}</p>
            <p class="text-gray-500 text-xs">${new Date(a.created_at).toLocaleString()}</p>
          </div>
        </div>
      `).join('');
    }

    async function useTool(id, name) {
      try {
        await fetch(`/api/dashboard/tools/${id}/use`, { method: 'POST' });
        alert(`Opening ${name}... (Phase 2 mein full integration hoga)`);
        init();
      } catch {}
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('overlay');
      sb.classList.toggle('mobile-menu-open');
      ov.classList.toggle('hidden');
    }

    init();
  </script>
</body>
</html>
