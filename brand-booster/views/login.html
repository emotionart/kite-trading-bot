<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Brand Booster AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
    .input-field { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s; }
    .input-field:focus { background: rgba(255,255,255,0.1); border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
    .logo-glow { filter: drop-shadow(0 0 20px rgba(102,126,234,0.6)); }
    @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    .float-anim { animation: float 4s ease-in-out infinite; }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    .error-toast { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

  <!-- Animated background particles -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-96 h-96 bg-purple-500 rounded-full opacity-5 -top-20 -left-20 blur-3xl"></div>
    <div class="absolute w-96 h-96 bg-blue-500 rounded-full opacity-5 -bottom-20 -right-20 blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo & Brand -->
    <div class="text-center mb-8 float-anim">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl btn-primary mb-4 logo-glow relative">
        <div class="absolute inset-0 rounded-2xl btn-primary pulse-ring opacity-40"></div>
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">Brand Booster</h1>
      <p class="text-gray-400 mt-1">AI Agent Dashboard</p>
    </div>

    <!-- Login Card -->
    <div class="glass rounded-2xl p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Welcome back</h2>

      <!-- Error message -->
      <div id="errorMsg" class="hidden error-toast rounded-xl p-4 mb-5 flex items-center gap-3">
        <svg class="w-5 h-5 text-red-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span id="errorText" class="text-red-300 text-sm"></span>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Email Address</label>
          <input type="email" id="email" required placeholder="you@thebrandbooster.biz"
            class="input-field w-full rounded-xl px-4 py-3 text-white placeholder-gray-500 text-sm">
        </div>

        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <input type="password" id="password" required placeholder="••••••••"
              class="input-field w-full rounded-xl px-4 py-3 text-white placeholder-gray-500 text-sm pr-12">
            <button type="button" onclick="togglePass()" class="absolute right-3 top-3 text-gray-500 hover:text-gray-300 transition-colors">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-purple-500">
            <span class="text-gray-400 text-sm">Remember me</span>
          </label>
          <a href="#" class="text-purple-400 text-sm hover:text-purple-300 transition-colors">Forgot password?</a>
        </div>

        <button type="submit" id="loginBtn"
          class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2">
          <span id="btnText">Sign In</span>
          <svg id="btnSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
        </button>
      </form>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6">
      &copy; 2024 Brand Booster AI &bull; agent.thebrandbooster.biz
    </p>
  </div>

  <script>
    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      document.getElementById('errorMsg').classList.remove('hidden');
      document.getElementById('errorText').textContent = msg;
    }

    function hideError() {
      document.getElementById('errorMsg').classList.add('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('btnSpinner');

      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      spinner.classList.remove('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();

        if (data.success) {
          btnText.textContent = 'Redirecting...';
          window.location.href = data.redirect;
        } else {
          showError(data.error || 'Login failed');
          btn.disabled = false;
          btnText.textContent = 'Sign In';
          spinner.classList.add('hidden');
        }
      } catch {
        showError('Network error. Please try again.');
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        spinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
